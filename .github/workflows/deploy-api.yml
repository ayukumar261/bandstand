name: Deploy API to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "apps/sinatra-api/**"
      - "terraform/cloudrun.tf"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

concurrency:
  group: deploy-api
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  PROJECT_ID: bandstand-494122
  REGION: us-central1
  SERVICE: bandstand-api
  AR_REPO: bandstand
  IMAGE_NAME: api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        working-directory: apps/sinatra-api
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform apply (rolls new image onto Cloud Run)
        working-directory: terraform
        run: |
          terraform init -input=false
          terraform apply -input=false -auto-approve \
            -var="image_tag=${GITHUB_SHA}"

      - name: Smoke-test /health
        run: |
          URL=$(gcloud run services describe "${SERVICE}" \
            --region "${REGION}" --format='value(status.url)')
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/health")
            if [ "$code" = "200" ]; then echo "OK"; exit 0; fi
            echo "attempt $i got $code; retrying"; sleep 5
          done
          echo "smoke test failed"; exit 1
