name: Deploy API to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "apps/sinatra-api/**"
      - "terraform/cloudrun.tf"
      - "terraform/cloudrun_job.tf"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

concurrency:
  group: deploy-api
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  PROJECT_ID: bandstand-494122
  REGION: us-central1
  SERVICE: bandstand-api
  MIGRATE_JOB: bandstand-migrate
  AR_REPO: bandstand
  IMAGE_NAME: api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        working-directory: apps/sinatra-api
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform init
        working-directory: terraform
        run: terraform init -input=false

      - name: Run DB migrations via Cloud Run Job
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${IMAGE_NAME}:${GITHUB_SHA}"
          if gcloud run jobs describe "${MIGRATE_JOB}" --region "${REGION}" >/dev/null 2>&1; then
            echo "Updating ${MIGRATE_JOB} to ${IMAGE}"
            gcloud run jobs update "${MIGRATE_JOB}" \
              --region "${REGION}" \
              --image "${IMAGE}"
            echo "Executing ${MIGRATE_JOB}"
            gcloud run jobs execute "${MIGRATE_JOB}" \
              --region "${REGION}" --wait
          else
            echo "${MIGRATE_JOB} not found yet — Terraform will create it; skipping migration this run"
          fi

      - name: Terraform apply (rolls new image onto Cloud Run)
        working-directory: terraform
        run: |
          terraform apply -input=false -auto-approve \
            -var="image_tag=${GITHUB_SHA}"

      - name: Smoke-test /health
        run: |
          URL=$(gcloud run services describe "${SERVICE}" \
            --region "${REGION}" --format='value(status.url)')
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/health")
            if [ "$code" = "200" ]; then echo "OK"; exit 0; fi
            echo "attempt $i got $code; retrying"; sleep 5
          done
          echo "smoke test failed"; exit 1

      - name: Smoke-test /health/db
        run: |
          URL=$(gcloud run services describe "${SERVICE}" \
            --region "${REGION}" --format='value(status.url)')
          for i in 1 2 3 4 5; do
            body=$(curl -s -o /tmp/health_db.json -w "%{http_code}" "${URL}/health/db") || body=""
            if [ "$body" = "200" ]; then
              version=$(jq -r '.schema_version // empty' /tmp/health_db.json)
              if [ -n "$version" ] && [ "$version" != "null" ]; then
                echo "OK schema_version=${version}"; exit 0
              fi
              echo "attempt $i: 200 but schema_version empty: $(cat /tmp/health_db.json)"
            else
              echo "attempt $i got $body"
            fi
            sleep 5
          done
          echo "/health/db smoke test failed"; cat /tmp/health_db.json || true; exit 1
